---
name: app-ci

on:
  pull_request:
    paths: ["app/**", ".github/workflows/app-ci.yml"]
  push:
    branches: [main]
    paths: ["app/**"]

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: docker compose up (apka + MySQL)
        run: docker compose up -d --build

      - name: Czekaj aż apka odpowie
        run: |
          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8000/ >/dev/null 2>&1; then break; fi
            sleep 3
          done
          curl -fsS http://127.0.0.1:8000/ | grep -q demo

      - name: Smoke — heartbeat OK + metryki
        run: |
          sleep 8
          curl -fsS http://127.0.0.1:8000/metrics | grep -q app_heartbeat_total
          curl -fsS http://127.0.0.1:8000/metrics | grep -E 'app_heartbeat_total\{result="ok"\} [1-9]'

      - name: Weryfikacja insert->delete (tabela pusta po cyklu)
        run: |
          for _ in $(seq 1 5); do
            n="$(docker compose exec -T db mysql -uroot -prootpw -N -e \
              'SELECT COUNT(*) FROM appdb.heartbeat' 2>/dev/null | tr -d '[:space:]')"
            echo "heartbeat rows=${n}"
            [ "${n}" = "0" ] && exit 0
            sleep 2
          done
          echo "tabela heartbeat nie wróciła do 0"; exit 1

      - name: Logi przy błędzie
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose down -v

  trivy:
    # Skan CVE obrazu apki (HIGH/CRITICAL z fixem = blokada).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build obrazu apki
        run: docker build -t app:scan app
      - name: Instaluj trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Trivy scan (HIGH/CRITICAL — raport)
        # Tryb raportu (exit-code 0): widoczne CVE w logach, nie blokuje labu.
        # Zaostrzenie do gate + automatyczne dep-bumpy = follow-up (Renovate). Patrz TASKS.
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 --no-progress app:scan

  publish:
    # Po zielonym smoke buduj i pchaj obraz do GHCR (tylko na merge do main).
    if: github.event_name == 'push'
    needs: [app, trivy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: |
            ghcr.io/cptdolphin/mysql-hetzner-lab-app:latest
            ghcr.io/cptdolphin/mysql-hetzner-lab-app:${{ github.sha }}
