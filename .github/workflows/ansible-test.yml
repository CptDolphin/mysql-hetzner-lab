---
name: ansible-test

on:
  pull_request:
    paths: ["ansible/**", ".github/workflows/ansible-test.yml", "requirements-dev.txt"]
  push:
    branches: [main]
    paths: ["ansible/**", "requirements-dev.txt"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ansible-lint>=24.9"
      - run: ansible-lint ansible/

  molecule:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install -r requirements-dev.txt
      - name: Molecule dla ról ze scenariuszem (bezpieczne gdy brak)
        run: |
          set -euo pipefail
          mapfile -t scenarios < <(find ansible/roles -type d -path '*/molecule/default' 2>/dev/null || true)
          if [ ${#scenarios[@]} -eq 0 ]; then
            echo "Brak ról z molecule/default — pomijam (harness gotowy, role dojdą w Fazach 3+)."
            exit 0
          fi
          for s in "${scenarios[@]}"; do
            role_dir="$(dirname "$(dirname "$s")")"
            echo "::group::molecule test — ${role_dir}"
            (cd "${role_dir}" && molecule test)
            echo "::endgroup::"
          done
