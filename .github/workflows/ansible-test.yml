---
name: ansible-test

on:
  pull_request:
    paths: ["ansible/**", ".github/workflows/ansible-test.yml", "requirements-dev.txt"]
  push:
    branches: [main]
    paths: ["ansible/**", "requirements-dev.txt"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible   # cwd=ansible/ → ansible.cfg roles_path=roles rozwiązuje role
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ansible-lint>=24.9" ansible-core
      - run: ansible-galaxy collection install -r requirements.yml
      - run: ansible-lint

  discover:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      roles: ${{ steps.set.outputs.roles }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        name: Wykryj role ze scenariuszem molecule
        run: |
          set -euo pipefail
          roles=$(find ansible/roles -type d -path '*/molecule/default' \
            | sed 's#/molecule/default##' | xargs -r -n1 basename | sort | jq -R . | jq -cs .)
          echo "roles=${roles}" >> "$GITHUB_OUTPUT"
          echo "Wykryte role: ${roles}"

  molecule:
    runs-on: ubuntu-latest
    needs: discover
    if: needs.discover.outputs.roles != '[]'
    strategy:
      fail-fast: false   # jedna rola czerwona nie ubija pozostałych
      matrix:
        role: ${{ fromJson(needs.discover.outputs.roles) }}
    name: molecule (${{ matrix.role }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install -r requirements-dev.txt
      - name: Install collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: molecule test
        working-directory: ansible/roles/${{ matrix.role }}
        run: molecule test
