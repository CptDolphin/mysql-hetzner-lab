---
# Główny playbook. Role dokładane fazami (TASKS.md): common + hardening (F3)
# → mysql, proxysql (F4) → backup, restore (F5/6) → docker, nginx, apka (F7/8).
# Każda rola = osobny PR + scenariusz Molecule (converge + idempotencja + Testinfra).
- name: MySQL lab — konfiguracja hosta
  hosts: mysql_lab
  become: true
  gather_facts: true
  # Tagi fazowe: pozwalają odpalić warstwy niezależnie, np. `--tags bootstrap,hardening`
  # (warstwa OS, BEZ sekretów) zanim Faza 0 dostarczy hasła dla data/app.
  roles:
    - { role: common, tags: [bootstrap] }
    - { role: deploy_user, tags: [bootstrap] }   # PRZED sshd_lockdown — sshd wpuszcza tylko tego usera
    - { role: chrony, tags: [bootstrap] }
    - { role: swap, tags: [bootstrap] }
    - { role: unattended_upgrades, tags: [hardening] }
    - { role: sshd_lockdown, tags: [hardening] }
    - { role: fail2ban, tags: [hardening] }
    - { role: sysctl_hardening, tags: [hardening] }
    - { role: logrotate, tags: [hardening] }
    - { role: auditd, tags: [hardening] }
    - { role: rkhunter, tags: [hardening] }
    - { role: lynis, tags: [hardening] }
    - { role: nftables, tags: [hardening] }
    - { role: mysql, tags: [data] }
    - { role: proxysql, tags: [data] }
    - { role: backup, tags: [data] }
    - { role: restore, tags: [data] }
    - { role: docker, tags: [app] }
    - { role: nginx, tags: [app] }
    - { role: certbot, tags: [app] }
    - { role: deploy, tags: [app] }
