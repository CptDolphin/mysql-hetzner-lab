---
# Główny playbook. Role dokładane fazami (TASKS.md): common + hardening (F3)
# → mysql, proxysql (F4) → backup, restore (F5/6) → docker, nginx, apka (F7/8).
# Każda rola = osobny PR + scenariusz Molecule (converge + idempotencja + Testinfra).
- name: MySQL lab — konfiguracja hosta
  hosts: mysql_lab
  become: true
  gather_facts: true
  roles:
    - common
    - deploy_user        # PRZED sshd_lockdown — sshd wpuszcza tylko tego usera
    - chrony
    - swap
    - unattended_upgrades
    - sshd_lockdown
    - fail2ban
    - sysctl_hardening
    - logrotate
    - auditd
    - nftables
    - mysql
    - proxysql
    - backup
    - restore
    - docker
    - nginx
    - deploy
