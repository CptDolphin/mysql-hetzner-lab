---
- name: Zainstaluj openssh-server
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Wygeneruj klucze hosta (jeśli brak)
  ansible.builtin.command: ssh-keygen -A
  args:
    creates: /etc/ssh/ssh_host_ed25519_key

- name: Banner logowania (/etc/issue.net)
  ansible.builtin.copy:
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"
    content: "{{ sshd_lockdown_banner }}"

- name: Konfiguracja hardeningu SSH (drop-in 10-hardening)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
    content: |
      # Zarządzane przez rolę sshd_lockdown. Nie edytuj ręcznie.
      PasswordAuthentication no
      PermitRootLogin no
      PubkeyAuthentication yes
      KbdInteractiveAuthentication no
      AuthenticationMethods publickey
      PermitEmptyPasswords no
      MaxAuthTries 3
      MaxSessions 5
      X11Forwarding no
      AllowAgentForwarding no
      AllowTcpForwarding local
      PermitTunnel no
      ClientAliveInterval 300
      ClientAliveCountMax 2
      LoginGraceTime 30
      AllowUsers {{ sshd_lockdown_allowed_users | join(' ') }}
      Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
      MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
      KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org
      HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256
      LogLevel VERBOSE
      Banner /etc/issue.net
  notify: Restart ssh
