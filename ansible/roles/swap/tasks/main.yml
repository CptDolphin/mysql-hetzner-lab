---
- name: Utwórz plik swap (dd — działa też na overlayfs)
  ansible.builtin.command: "dd if=/dev/zero of={{ swap_file_path }} bs=1M count={{ swap_size_mb }}"
  args:
    creates: "{{ swap_file_path }}"

- name: Uprawnienia swapfile 0600
  ansible.builtin.file:
    path: "{{ swap_file_path }}"
    owner: root
    group: root
    mode: "0600"

- name: Sprawdź, czy plik jest już sformatowany jako swap
  ansible.builtin.command: "file -bs {{ swap_file_path }}"
  register: swap_filetype
  changed_when: false

- name: Sformatuj swap (mkswap)
  ansible.builtin.command: "mkswap {{ swap_file_path }}"
  when: "'swap' not in swap_filetype.stdout"

- name: Wpis w /etc/fstab (bez montowania)
  ansible.posix.mount:
    path: none
    src: "{{ swap_file_path }}"
    fstype: swap
    opts: sw
    state: present

- name: Włącz swap (swapon) — poza kontenerem molecule
  ansible.builtin.command: "swapon {{ swap_file_path }}"
  when: swap_enable | bool
  register: swap_swapon
  changed_when: swap_swapon.rc == 0
  failed_when:
    - swap_swapon.rc != 0
    - "'already' not in (swap_swapon.stderr | default(''))"

- name: Ustaw vm.swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ swap_swappiness | string }}"
    sysctl_set: "{{ swap_enable }}"
    reload: "{{ swap_enable }}"
    state: present
