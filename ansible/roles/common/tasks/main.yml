---
- name: Wymagaj Ubuntu 24.04+
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
      - ansible_distribution_version is version('24.04', '>=')
    fail_msg: >-
      Wspierane tylko Ubuntu >= 24.04 (wykryto {{ ansible_distribution }} {{ ansible_distribution_version }}).
    quiet: true

- name: Odśwież cache apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Zainstaluj pakiety bazowe
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Ustaw strefę czasową
  community.general.timezone:
    name: "{{ common_timezone }}"
