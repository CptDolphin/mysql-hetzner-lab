---
- name: Wymagaj Ubuntu 24.04+
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
      - ansible_distribution_version is version('24.04', '>=')
    fail_msg: >-
      Wspierane tylko Ubuntu >= 24.04 (wykryto {{ ansible_distribution }} {{ ansible_distribution_version }}).
    quiet: true

# Świeży obraz Hetznera potrafi mieć NIEPEŁNY indeks apt (cloud-init ustawia znacznik
# czasu, przez co `cache_valid_time` pomijał realny refresh → instalacja na okrojonej
# liście pakietów = "No package matching 'jq'"). Dlatego wymuszamy pełny update z retry.
- name: Odśwież cache apt (pełny refresh, z retry na chwilowy mirror)
  ansible.builtin.apt:
    update_cache: true
  register: common_apt_update
  retries: 3
  delay: 5
  until: common_apt_update is succeeded

- name: Zainstaluj pakiety bazowe
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Ustaw strefę czasową — symlink /etc/localtime
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ common_timezone }}"
    dest: /etc/localtime
    state: link
    force: true

- name: Ustaw strefę czasową — /etc/timezone
  ansible.builtin.copy:
    content: "{{ common_timezone }}\n"
    dest: /etc/timezone
    owner: root
    group: root
    mode: "0644"
