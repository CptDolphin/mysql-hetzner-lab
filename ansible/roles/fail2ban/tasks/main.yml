---
- name: Zainstaluj fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Konfiguracja jaili fail2ban (sshd + recidive)
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
    content: |
      [DEFAULT]
      bantime  = {{ fail2ban_bantime }}
      findtime = {{ fail2ban_findtime }}
      maxretry = {{ fail2ban_maxretry }}
      backend  = systemd
      banaction = {{ fail2ban_banaction }}

      [sshd]
      enabled = true
      port    = ssh
      filter  = sshd

      [recidive]
      enabled  = true
      bantime  = 30d
      findtime = 1w
      maxretry = 3
  notify: Restart fail2ban

- name: Włącz fail2ban (autostart)
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true

- name: Uruchom fail2ban (poza molecule)
  ansible.builtin.systemd:
    name: fail2ban
    state: started
  when: fail2ban_manage_service | bool
