---
- name: Zainstaluj nftables
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ruleset /etc/nftables.conf
  ansible.builtin.copy:
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nft -c -f %s"
    content: |
      #!/usr/sbin/nft -f
      # Zarządzane przez rolę nftables. Defense-in-depth ZA Hetzner Cloud Firewall.
      flush ruleset

      table inet filter {
          chain input {
              type filter hook input priority 0; policy drop;

              iif "lo" accept
              ct state established,related accept
              ct state invalid drop

              # Odrzuć zniekształcone pakiety TCP (skany NULL / XMAS / SYN+FIN)
              tcp flags & (fin|syn) == (fin|syn) drop
              tcp flags & (syn|rst) == (syn|rst) drop
              tcp flags & (fin|syn|rst|psh|ack|urg) == 0 drop

              # ICMP (ping) z limitem — diagnostyka bez nadużyć
              ip protocol icmp icmp type echo-request limit rate 5/second accept
              ip6 nexthdr ipv6-icmp icmpv6 type { echo-request, nd-neighbor-solicit, nd-neighbor-advert } accept

              # SSH — PER-IP rate (anty-brute-force; resztę dobija fail2ban)
              tcp dport 22 ct state new meter ssh-rate { ip saddr limit rate over 10/minute } drop
              tcp dport 22 ct state new accept

              # Publiczna aplikacja (80/443) — limity PER-IP (jeden IP nie zżera całego portu):
              #   conn-count: max równoległych połączeń z jednego IP; new-rate: tempo nowych połączeń z jednego IP
              tcp dport { 80, 443 } ct state new meter web-conn { ip saddr ct count over 50 } drop
              tcp dport { 80, 443 } ct state new meter web-rate { ip saddr limit rate over 25/second burst 50 packets } drop
              tcp dport { 80, 443 } ct state new accept

              # 3306 (MySQL) celowo BRAK — baza tylko na 127.0.0.1
          }

          chain forward {
              type filter hook forward priority 0; policy drop;
          }

          chain output {
              type filter hook output priority 0; policy accept;
          }
      }
  notify: Reload nftables

- name: Włącz nftables (autostart)
  ansible.builtin.systemd:
    name: nftables
    enabled: true

- name: Uruchom nftables (poza molecule)
  ansible.builtin.systemd:
    name: nftables
    state: started
  when: nftables_manage_service | bool
