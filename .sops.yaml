# Reguły szyfrowania SOPS (age).
# Setup (Faza 0 — sekrety):
#   age-keygen -o ~/.config/sops/age/keys.txt
#   → publiczny klucz (age1...) wstaw poniżej zamiast placeholdera.
# Szyfrowane pliki nazywamy *.sops.yml i MOŻNA je commitować; plaintext sekretów NIE.
---
creation_rules:
  - path_regex: (secrets|ansible/inventory/group_vars)/.*\.sops\.ya?ml$
    age: age10ts5z8tukjah83tg4uq47783tzwjgaxz70pm7n49nmqy2sj8q3gqx5knv7
    encrypted_regex: "^(.*[Pp]assword.*|.*[Ss]ecret.*|.*[Tt]oken.*|.*[Kk]ey.*|.*[Pp]assphrase.*)$"
